  translations:
    en:
      description:
        heading: WHAT IS SQUAD DUNK?
        short:
          title: SHORT DESCRIPTION
          text: >-
            Squad Dunk is a first-person online basketball game with
            physics-based mechanics, built around team play and arcade
            accessibility.
        long:
          title: LONG DESCRIPTION
          paragraphs:
            - >-
              Squad Dunk is a first-person online basketball game where each
              player controls one character on the court and competes as part of
              a team.
            - >-
              Instead of relying on canned sports animations and distant
              cameras, physics-based mechanics make the game highly immersive,
              allowing players to lose themselves in the plays like kids.
            - >-
              The game is designed to be easy to pick up, with simple rules and
              fast arcade-style logic, while still giving players room to
              improve. Players can customize their character, build their squad
              identity, and play online with friends.
        key_features_title: Key Features
        key_features:
          - icon: "🏀"
            title: PLAY FROM THE COURT
            body: >-
              Control one player in first person and experience the match from
              inside the action, not from a distant camera.
          - icon: "🏀"
            title: FEEL THE PHYSICS
            body: >-
              Squad Dunk uses physics-based mechanics to make basketball feel
              more alive, physical, and unpredictable. Blocks, shots, steals,
              rebounds, movement, and contact all become part of the moment.
          - icon: "🏀"
            title: BUILD YOUR SQUAD
            body: >-
              Play online with friends, customize your character, and build your
              team identity as you compete together.
          - icon: "🏀"
            title: EVERY COURT CHANGES THE GAME
            body: >-
              Each court adds its own twist, with new mechanics and layouts that
              make teams adapt in different ways.
    es: {}
    ru: {}
    ja:
      description:
        heading: SQUAD DUNKとは？
        short:
          title: ショート説明
          text: >-
            Squad Dunkは、一人称視点、物理ベースのメカニクス、チームプレイ、そして遊びやすいアーケード感を軸にしたオンラインバスケットボールゲームです。
        long:
          title: ロング説明
          paragraphs:
            - >-
              Squad Dunkは、各プレイヤーがコート上の1人のキャラクターを操作し、チームの一員として競い合う一人称視点のオンラインバスケットボールゲームです。
            - >-
              決められたスポーツアニメーションや遠いカメラに頼るのではなく、物理ベースのメカニクスによって、子どものようにプレイに夢中になれる高い没入感を生み出します。
            - >-
              シンプルなルールとテンポの速いアーケードスタイルで、すぐに遊び始められる一方、動き、タイミング、チームワーク、ボールコントロールを通じて上達の余地があります。プレイヤーはキャラクターをカスタマイズし、スクワッドの個性を作り、友達とオンラインで遊べます。
        keyFeaturesTitle: 主な特徴
        keyFeatures:
          - icon: "🏀"
            title: コートの中からプレイ
            body: >-
              遠くのカメラではなく、一人称視点で1人の選手を操作し、アクションの内側から試合を体験します。
          - icon: "🏀"
            title: 物理を感じる
            body: >-
              物理ベースのメカニクスにより、ブロック、シュート、スティール、リバウンド、移動、接触のすべてが、その瞬間のプレイに影響します。
          - icon: "🏀"
            title: スクワッドを作る
            body: >-
              友達とオンラインで遊び、キャラクターをカスタマイズし、チームの個性を作りながら一緒に競い合います。
          - icon: "🏀"
            title: コートごとにゲームが変わる
            body: >-
              それぞれのコートには独自の仕掛けやレイアウトがあり、チームは状況に合わせてプレイを変える必要があります。
    zh: {}
    de:
      description:
        heading: WAS IST SQUAD DUNK?
        short:
          title: KURZBESCHREIBUNG
          text: >-
            Squad Dunk ist ein Online-Basketballspiel aus der
            First-Person-Perspektive mit physikbasierten Mechaniken, das auf
            Teamplay und Arcade-Zugänglichkeit ausgelegt ist.
        long:
          title: LANGE BESCHREIBUNG
          paragraphs:
            - >-
              Squad Dunk ist ein Online-Basketballspiel aus der
              First-Person-Perspektive, in dem jede Person einen Charakter auf
              dem Court steuert und als Teil eines Teams antritt.
            - >-
              Statt auf vorgefertigte Sportanimationen und entfernte Kameras zu
              setzen, sorgen physikbasierte Mechaniken für ein besonders
              immersives Spielgefühl, bei dem man sich wie Kinder direkt in den
              Spielzügen verlieren kann.
            - >-
              Das Spiel ist leicht zugänglich, mit einfachen Regeln und schneller
              Arcade-Logik, bietet aber trotzdem Raum, besser zu werden.
              Spielerinnen und Spieler können ihren Charakter anpassen, eine
              eigene Squad-Identität aufbauen und online mit Freundinnen und
              Freunden spielen.
        keyFeaturesTitle: Hauptfeatures
        keyFeatures:
          - icon: "🏀"
            title: SPIEL DIREKT VOM COURT
            body: >-
              Steuere einen Spieler in der First-Person-Perspektive und erlebe
              das Match mitten aus der Action heraus, nicht aus einer entfernten
              Kamera.
          - icon: "🏀"
            title: SPÜRE DIE PHYSIK
            body: >-
              Physikbasierte Mechaniken machen Basketball lebendiger,
              körperlicher und unvorhersehbarer. Blocks, Würfe, Steals,
              Rebounds, Bewegung und Kontakt werden Teil jedes Moments.
          - icon: "🏀"
            title: BAUE DEIN SQUAD
            body: >-
              Spiele online mit Freunden, passe deinen Charakter an und baue
              gemeinsam mit deinem Team eine eigene Identität auf.
          - icon: "🏀"
            title: JEDER COURT VERÄNDERT DAS SPIEL
            body: >-
              Jeder Court bringt eigene Twists, Mechaniken und Layouts mit, an
              die sich Teams auf unterschiedliche Weise anpassen müssen.
    fr: {}
    pt: {}

