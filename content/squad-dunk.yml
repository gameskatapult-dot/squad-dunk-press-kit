team:
  about_title: About Katapult Games
  boilerplate_title: About
  boilerplate: >-
    A small indie video game studio based in Berlin.

    We are Katapult Games and we build games with our community, not just for
    them. Driven by transparency, flexibility and a love for modern gaming
    trends, our mission is to create high energy multiplayer experiences that
    truly connect with players. We don't just want you to play our games, we
    want you to help us shape them. Welcome to the squad!
  credits_title: Developers
  credits: Bruno Braghetto, Matias Nicolini and Anahi Mou

