  translations:
    en:
      description:
        heading: WHAT IS SQUAD DUNK?
        short:
          title: Short Description
          text: >-
            Squad Dunk is a first-person online basketball game with
            physics-based mechanics, built around team play, timing and playing
            with friends from inside the court.
        long:
          title: Long Description
          paragraphs:
            - >-
              Squad Dunk reimagines basketball as a first-person online game
              where players are inside the play rather than watching the sport
              from above. Control a single player, read the court in real time
              and work with your squad to create shots, passes, steals and
              defensive plays. Physics-based shots, passes, and steals make
              timing, positioning, and teamwork central to every match.
            - >-
              The game is not a strict basketball simulation. It is designed to
              be easy to understand from the first match, with readable action,
              low downtime, and a skill curve built around movement,
              coordination, and physical ball control.
        key_features_title: Key Features
        key_features:
          - icon: "🏀"
            title: FIRST-PERSON BASKETBALL
            body: >-
              Play basketball from inside the court. Instead of managing a full
              team from a distant camera, you control one player directly in
              first person and experience every pass, steal, shot, and defensive
              play from your own perspective.
          - icon: "🏀"
            title: PHYSICS-BASED BALL CONTROL
            body: >-
              Shots, passes, steals, and rebounds are shaped by physical
              interaction with the ball. Timing, angle, movement, and positioning
              matter, making each successful play feel readable and earned.
          - icon: "🏀"
            title: TEAM PLAY
            body: >-
              Squad Dunk is built around playing with friends online. Move into
              space, call for the ball, make the extra pass, defend together, and
              turn individual actions into coordinated team plays.
          - icon: "🏀"
            title: EASY TO START, FUN TO IMPROVE
            body: >-
              Squad Dunk is designed to be accessible from the first match.
              Players can quickly understand what is happening, while still
              finding room to improve through movement, timing, team
              coordination, and ball control.
          - icon: "🏀"
            title: SCHOOL-COURT ENERGY
            body: >-
              Squad Dunk is inspired by the feeling of playing basketball with
              friends after class: quick to understand, social, competitive, and
              built around that "one more game" feeling.
