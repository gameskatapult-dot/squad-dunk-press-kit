  translations:
    en:
      description:
        heading: WHAT IS SQUAD DUNK?
        short:
          title: SHORT DESCRIPTION
          text: >-
            Squad Dunk is a first-person online basketball game with
            physics-based mechanics, built around team play and arcade
            accessibility.
        long:
          title: LONG DESCRIPTION
          paragraphs:
            - >-
              Squad Dunk is a first-person online basketball game where each
              player controls one character on the court and competes as part of
              a team.
            - >-
              Instead of relying on canned sports animations and distant
              cameras, physics-based mechanics make the game highly immersive,
              allowing players to lose themselves in the plays like kids.
            - >-
              The game is designed to be easy to pick up, with simple rules and
              fast arcade-style logic, while still giving players room to
              improve. Players can customize their character, build their squad
              identity, and play online with friends.
        key_features_title: Key Features
        key_features:
          - icon: "🏀"
            title: PLAY FROM THE COURT
            body: >-
              Control one player in first person and experience the match from
              inside the action, not from a distant camera.
          - icon: "🏀"
            title: FEEL THE PHYSICS
            body: >-
              Squad Dunk uses physics-based mechanics to make basketball feel
              more alive, physical, and unpredictable. Blocks, shots, steals,
              rebounds, movement, and contact all become part of the moment.
          - icon: "🏀"
            title: BUILD YOUR SQUAD
            body: >-
              Play online with friends, customize your character, and build your
              team identity as you compete together.
          - icon: "🏀"
            title: EVERY COURT CHANGES THE GAME
            body: >-
              Each court adds its own twist, with new mechanics and layouts that
              make teams adapt in different ways.
