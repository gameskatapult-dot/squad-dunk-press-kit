    ja:
      description:
        heading: SQUAD DUNKとは？
        short:
          title: ショート説明
          text: >-
            Squad Dunkは、一人称視点、物理ベースのメカニクス、チームプレイ、そして遊びやすいアーケード感を軸にしたオンラインバスケットボールゲームです。
        long:
          title: ロング説明
          paragraphs:
            - >-
              Squad Dunkは、各プレイヤーがコート上の1人のキャラクターを操作し、チームの一員として競い合う一人称視点のオンラインバスケットボールゲームです。
            - >-
              決められたスポーツアニメーションや遠いカメラに頼るのではなく、物理ベースのメカニクスによって、子どものようにプレイに夢中になれる高い没入感を生み出します。
            - >-
              シンプルなルールとテンポの速いアーケードスタイルで、すぐに遊び始められる一方、動き、タイミング、チームワーク、ボールコントロールを通じて上達の余地があります。プレイヤーはキャラクターをカスタマイズし、スクワッドの個性を作り、友達とオンラインで遊べます。
        keyFeaturesTitle: 主な特徴
        keyFeatures:
          - icon: "🏀"
            title: コートの中からプレイ
            body: >-
              遠くのカメラではなく、一人称視点で1人の選手を操作し、アクションの内側から試合を体験します。
          - icon: "🏀"
            title: 物理を感じる
            body: >-
              物理ベースのメカニクスにより、ブロック、シュート、スティール、リバウンド、移動、接触のすべてが、その瞬間のプレイに影響します。
          - icon: "🏀"
            title: スクワッドを作る
            body: >-
              友達とオンラインで遊び、キャラクターをカスタマイズし、チームの個性を作りながら一緒に競い合います。
          - icon: "🏀"
            title: コートごとにゲームが変わる
            body: >-
              それぞれのコートには独自の仕掛けやレイアウトがあり、チームは状況に合わせてプレイを変える必要があります。
