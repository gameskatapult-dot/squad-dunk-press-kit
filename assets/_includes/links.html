{{#if presskit.links}}
<section class="block">
  <h2 id="links" data-l10n="ui.links.title">Links</h2>

  <dl>
    {{#each presskit.links}}
    <dt>{{title}}</dt>
    <dd>
      {{#if label}}{{label}} {{/if}}<a href="{{url}}" data-analytics-event="Social Link Click">{{prettyURL url}}</a>
    </dd>
    {{/each}}
  </dl>
</section>
{{/if}}
